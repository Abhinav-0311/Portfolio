<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Page Not Found | Abhinav Jain</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
    <style>
      :root {
        --bg: #fafaf9;
        --text: #1c1917;
        --muted: #78716c;
        --border: #e2dcd5;
        --surface: #f0ece7;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #050505;
          --text: #fafafa;
          --muted: #a3a3a3;
          --border: #2a2a2a;
          --surface: #101010;
        }
      }

      * { box-sizing: border-box; margin: 0; }

      body {
        display: grid;
        place-items: center;
        min-height: 100vh;
        padding: 24px;
        background: var(--bg);
        color: var(--text);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, sans-serif;
        -webkit-font-smoothing: antialiased;
        text-align: center;
      }

      .container {
        max-width: 480px;
      }

      .code {
        font-family: "Space Grotesk", Inter, ui-sans-serif, system-ui, sans-serif;
        font-size: clamp(5rem, 15vw, 9rem);
        font-weight: 700;
        line-height: 1;
        letter-spacing: -0.03em;
        margin-bottom: 16px;
        opacity: 0.12;
      }

      h1 {
        font-family: "Space Grotesk", Inter, ui-sans-serif, system-ui, sans-serif;
        font-size: clamp(1.5rem, 4vw, 2rem);
        font-weight: 700;
        margin-bottom: 12px;
      }

      p {
        color: var(--muted);
        font-size: 16px;
        line-height: 1.6;
        margin-bottom: 32px;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 48px;
        padding: 0 28px;
        border-radius: 999px;
        background: var(--text);
        color: var(--bg);
        font-family: "Space Grotesk", Inter, ui-sans-serif, system-ui, sans-serif;
        font-size: 15px;
        font-weight: 600;
        text-decoration: none;
        transition: opacity 160ms ease;
      }

      a:hover { opacity: 0.85; }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="code">404</div>
      <h1>Page not found</h1>
      <p>The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
      <a href="/">Back to portfolio</a>
    </div>
  </body>
</html>
